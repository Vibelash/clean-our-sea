spring.application.name=clean-our-sea-combined

# ---------------------------------------------------------------------------
# Single combined H2 database for all 5 teammate modules.
#
# Why one DB: the combined backend scans entities + repositories from all
# five packages (com.q.quizzes, communities.communities, com.example.backend,
# com.example.seasweepers, com.example.snakebackend) into ONE
# EntityManagerFactory, so every module's JPA repo talks to the same H2
# instance at `~/cleanoursea.mv.db`.
#
# Why `~/cleanoursea` (user-home) instead of `./data/cleanoursea` (cwd):
# the path is resolved identically no matter which directory the JVM is
# launched from. If a teammate ever boots their standalone backend in
# `2433841-Tala/backend` or `2431260-May/backend` they see the SAME tables
# as the combined backend, not a fresh empty DB in a nested `data/` folder.
#
# AUTO_SERVER=TRUE: allows multiple JVMs to share the same file at once via
# H2's automatic mixed-mode (first connection becomes a TCP server, the
# rest connect as clients). Without this flag a second process hitting the
# file would get "Database may be already in use".
#
# Swap `file:` → `mem:` if you want a clean slate every run instead.
# ---------------------------------------------------------------------------
#
# Datasource is env-driven so the same JAR runs locally on H2 and on
# Render against a real Postgres without code changes. Set ONE of:
#
#   JDBC_DATABASE_URL=jdbc:postgresql://host:5432/db
#   DATABASE_URL=jdbc:postgresql://host:5432/db
#
# plus DATABASE_USERNAME / DATABASE_PASSWORD on Render. With nothing set
# we fall back to H2 in-memory so `mvn spring-boot:run` still works for
# local dev and the standalone module backends.
#
# Render's managed Postgres exposes both JDBC_DATABASE_URL (Spring-ready)
# and DATABASE_URL (raw postgres:// form) as env vars on the service.
#
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:mem:cleanoursea;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console
# JDBC URL to paste: jdbc:h2:file:~/cleanoursea
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Expose actuator-less info for debugging
server.port=${PORT:8080}
server.error.include-message=always

# Faster startup on Render free tier where the platform's port-detection
# window is shorter than Spring Boot's full eager-init time.
spring.main.lazy-initialization=true
spring.jmx.enabled=false

# data.sql is loaded after JPA creates the schema. Only runs against
# embedded databases (H2) so we don't re-insert demo rows on every
# Postgres restart. continue-on-error=true keeps a rerun against an
# already-seeded H2 file from blowing up.
spring.sql.init.mode=embedded
spring.sql.init.continue-on-error=true
