spring.application.name=communities

# ---------------------------------------------------------------------------
# Uses the SAME H2 file as the combined backend at
# `clean-our-sea-local/backend/`. See that module's application.properties
# for the full rationale (one DB shared by all 5 teammate modules, using
# `~/cleanoursea.mv.db` with AUTO_SERVER=TRUE so multiple JVMs can attach).
#
# In practice the combined backend is what actually runs (on :8080); this
# standalone config exists only for Tarun's own debugging. Keeping the URL
# identical guarantees that hitting this standalone won't fragment data
# into a second "communities" DB.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:~/cleanoursea;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Standalone uses 8081 so it doesn't collide with the combined backend on
# 8080 if both happen to be running.
server.port=8081
