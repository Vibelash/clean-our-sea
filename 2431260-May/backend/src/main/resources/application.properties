spring.application.name=pollution-reports

# ---------------------------------------------------------------------------
# Uses the SAME H2 file as the combined backend at
# `clean-our-sea-local/backend/`. See that module's application.properties
# for the full rationale (one DB shared by all 5 teammate modules, using
# `~/cleanoursea.mv.db` with AUTO_SERVER=TRUE so multiple JVMs can attach).
#
# Kept only for May's own debugging — the real runtime uses the combined
# backend on :8080, which owns the `/pollution-reports` endpoint. This
# file was previously a 2-line stub left over from zip extraction; the
# combined properties below let May boot the standalone without
# fragmenting the DB.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:~/cleanoursea;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Standalone uses 8084 so it doesn't collide with the combined backend on
# 8080 (nor Tarun 8081 / Tala 8082 / Karan 8083).
server.port=8084
