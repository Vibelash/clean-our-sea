<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat — Clean Our Sea</title>
    <link rel="stylesheet" href="css/style.css">

<body>

    <nav>
        <a class="brand" href="index.html">
            <span class="dot"></span>

        </a>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>

    <div class="chat-container fade-up">
        <a href="communities.html" class="back-link">&larr; Back to Communities</a>

        <div class="chat-card">
            <h1 id="communityName">Chat</h1>
            <div id="messages" class="messages-area"></div>
            <form id="chatForm" class="chat-form">
                <input id="author" type="text" placeholder="Your name" required>
                <input id="msg" type="text" placeholder="Type a message..." required autocomplete="off">
                <button type="submit" class="btn primary">Send</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
