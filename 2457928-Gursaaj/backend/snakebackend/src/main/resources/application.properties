spring.application.name=snakebackend

# ---------------------------------------------------------------------------
# Uses the SAME H2 file as the combined backend at
# `clean-our-sea-local/backend/`. See that module's application.properties
# for the full rationale (one DB shared by all 5 teammate modules, using
# `~/cleanoursea.mv.db` with AUTO_SERVER=TRUE so multiple JVMs can attach).
#
# Kept only for Karan's own debugging; production deploy is the combined
# backend on :8080 (this standalone was originally what got deployed to
# Render under snakebackend-v3, but locally we only boot the combined one).
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:~/cleanoursea;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Standalone uses 8083 so it doesn't collide with the combined backend on
# 8080 (nor Tarun on 8081 / Tala on 8082) when everything runs at once.
server.port=8083
