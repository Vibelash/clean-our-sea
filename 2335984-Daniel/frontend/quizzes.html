<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ocean Quizzes - Clean Our Sea</title>
    <link rel="stylesheet" href="quizzstyle.css" />
    <style>
      :root {
        --white: #ffffff;
        --muted-light: #ccf1fe;
        --accent-light: #59a0e7;
        --bg-dark: #0f1724;
        --muted-dark: #9aa4b2;
        --accent: #3b82f6;
      }
      body {
        margin: 0; padding: 0; width: 100%; min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background-color: var(--muted-light); overflow-x: hidden;
      }
      nav {
        background: white; padding: 15px 30px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        position: sticky; top: 0; z-index: 100;
        display: flex; justify-content: center; align-items: center; gap: 40px;
      }
      nav a {
        display: inline-block; padding: 10px 16px; border-radius: 8px;
        background: transparent; color: #4a4a4d; font-weight: 500;
        text-decoration: none; transition: 0.3s ease; position: relative;
      }
      nav a:hover { background: rgba(0,0,0,0.08); }
      nav a::after {
        content: ""; display: block; height: 3px; width: 0%;
        background: #070f2c; transition: 0.3s ease; margin: 0 auto; border-radius: 10px;
      }
      nav a:hover::after, nav a.active::after { width: 80%; }
      nav a.logo img { height: 30px; width: auto; display: block; }
      .map { border: 2px solid #070f2c; border-radius: 4px; padding: 2px 2rem; color: #070f2c; }
    </style>
  </head>
  <body>
    <nav>
      <a href="#" class="logo"><img src="logo.png" alt="Clean Our Sea Logo"></a>
      <a href="communities.html">Community</a>
      <a href="index.html">Home</a>
      <a href="quizzes.html" class="active">Quizzes</a>
      <a href="#">Games</a>
      <a href="#">Leaderboards</a>
      <a href="#" class="map">Log in</a>
    </nav>

    <div class="quiz-container">
      <h1 class="page-title">Ocean World Quizzes</h1>
      <p class="page-subtitle">Take a quiz to test your knowledge and learn about the marine world and conservation efforts</p>

      <!-- stats are filled in by quizzes.js after it calls GET /user-quiz/stats/1 -->
      <div class="stats-section">
        <h2 class="stats-title">Your Progress</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <!-- updated by JS with the number of quiz attempts from the database -->
            <div class="stat-number" id="stat-completed">—</div>
            <div class="stat-label">Quizzes Completed</div>
          </div>
          <div class="stat-card">
            <!-- updated by JS with average score from the database -->
            <div class="stat-number" id="stat-avg">—</div>
            <div class="stat-label">Average Score</div>
          </div>
          <div class="stat-card">
            <!-- static for now until achievements table is connected -->
            <div class="stat-number">4</div>
            <div class="stat-label">Badges Earned</div>
          </div>
          <div class="stat-card">
            <!-- updated by JS with total points from the database -->
            <div class="stat-number" id="stat-points">—</div>
            <div class="stat-label">Total Points</div>
          </div>
        </div>
      </div>

      <div class="filter-row">
        <div class="filter-left">
          <label for="difficulty-filter">Filter by difficulty</label>
          <select id="difficulty-filter">
            <option value="all">All Quizzes</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div class="filter-right">
          <input type="text" id="quiz-search" placeholder="Search Quizzes...">
        </div>
      </div>

      <!-- cards are built dynamically by quizzes.js using data from the API -->
      <div class="quiz-grid" id="quiz-grid"></div>
    </div>

    <script src="quizzes.js"></script>
  </body>
</html>
