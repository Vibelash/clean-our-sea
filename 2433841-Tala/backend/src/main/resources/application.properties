spring.application.name=seasweepers

# ---------------------------------------------------------------------------
# Uses the SAME H2 file as the combined backend at
# `clean-our-sea-local/backend/`. See that module's application.properties
# for the full rationale (one DB shared by all 5 teammate modules, using
# `~/cleanoursea.mv.db` with AUTO_SERVER=TRUE so multiple JVMs can attach).
#
# Kept only for Tala's own debugging — the real runtime uses the combined
# backend on :8080.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:~/cleanoursea;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update

# Standalone uses 8082 so it doesn't collide with the combined backend on
# 8080 (or Tarun's standalone on 8081) if everything runs at once.
server.port=8082
