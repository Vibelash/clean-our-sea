<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — Clean Our Sea</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a class="brand" href="index.html">
            <span class="dot"></span>
            Clean Our Sea
        </a>
        <a href="index.html">Home</a>
        <a href="news.html">News</a>
        <a href="game.html">Play</a>
        <a href="quizzes.html">Quizzes</a>
        <a href="login.html" class="active">Log in</a>
        <a href="register.html">Register</a>
                <a href="communities.html">Communities</a>
        <a href="leaderboard.html">Leaderboard</a>
        <div class="spacer"></div>
    </nav>

    <div class="auth-shell">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to clean the sea and climb the leaderboard.</p>

            <div id="message" class="message"></div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required minlength="8">
                </div>

                <div class="form-row">
                    <label>
                        <input type="checkbox" id="remember">
                        Remember me
                    </label>
                    <a href="#" onclick="event.preventDefault();alert('Password reset is not implemented in the demo build.');">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="primary-btn">Log in</button>
            </form>

            <p class="auth-footer">
                New here? <a href="register.html">Create an account</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
