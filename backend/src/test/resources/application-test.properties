# Test profile — completely isolated in-memory H2.
# Activated by @ActiveProfiles("test") on the test classes so the
# real ~/cleanoursea.mv.db file is never touched.
spring.datasource.url=jdbc:h2:mem:cleanoursea-test;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# data.sql ships dummy users for the dev DB; tests should start clean.
spring.sql.init.mode=never
