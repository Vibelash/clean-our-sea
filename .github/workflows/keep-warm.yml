name: keep-warm

# Pings the Render free-tier backend every ~10 minutes so it doesn't
# spin down. Without this the first request after ~15 min of idle takes
# 30-60s while the dyno cold-starts, which makes the site look broken.
#
# GitHub schedules cron jobs on a best-effort basis (usually within a
# few minutes of the requested time). The */10 schedule plus Render's
# 15-minute idle window leaves comfortable headroom.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend
        run: |
          # max-time 120 covers worst-case Render cold-starts; --retry rides
          # out transient blips so a single hiccup doesn't spam failure email.
          curl -fsS \
               --max-time 120 \
               --retry 3 \
               --retry-delay 15 \
               --retry-all-errors \
               https://clean-our-sea-backend.onrender.com/ \
            && echo "backend warm" \
            || (echo "backend ping failed after retries" && exit 1)
